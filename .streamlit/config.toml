[server]
# HF Spaces requires port 7860
port = 7860
address = "0.0.0.0"
headless = true
# Disable file watcher in production (saves CPU, no live-reload needed)
fileWatcherType = "none"
# CORS disabled — HF Spaces proxies traffic through its own layer
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#FF6B35"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1A1F2E"
textColor = "#FAFAFA"
